<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nova Venda — Restaurante Brandão</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <a href="index.html" class="back-btn">&#8592;</a>
    <h1>Nova Venda</h1>
  </div>
</div>

<div class="container">
  <div class="form-card">
    <div class="form-group">
      <label for="categoria">Categoria</label>
      <select id="categoria">
        <option value="">Selecione...</option>
        <option value="Marmita">Marmita</option>
        <option value="Buffet">Buffet</option>
        <option value="iFood">iFood</option>
      </select>
    </div>
    <div class="form-group">
      <label for="quantidade">Quantidade</label>
      <input type="number" id="quantidade" placeholder="0" min="1" />
    </div>
    <div class="form-group">
      <label for="valor">Valor total (R$)</label>
      <input type="number" id="valor" placeholder="0,00" min="0" step="0.01" />
    </div>
    <div class="btn-row">
      <a href="index.html" class="btn" style="text-align:center; text-decoration:none; display:flex; align-items:center; justify-content:center;">Cancelar</a>
      <button class="btn primary" onclick="salvar()">Salvar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="app.js"></script>
<script>
  function salvar() {
    const categoria = document.getElementById('categoria').value;
    const quantidade = document.getElementById('quantidade').value;
    const valor = document.getElementById('valor').value;

    if (!categoria || !quantidade || !valor) {
      showToast('Preencha todos os campos.');
      return;
    }
    if (Number(quantidade) <= 0 || Number(valor) <= 0) {
      showToast('Quantidade e valor devem ser maiores que zero.');
      return;
    }

    DB.salvarVenda({ categoria, quantidade: Number(quantidade), valor: Number(valor) });
    showToast('Venda salva com sucesso!');
    setTimeout(() => window.location.href = 'index.html', 1500);
  }
</script>
</body>
</html>
