<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Caixa — Restaurante Brandão</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <a href="index.html" class="back-btn">&#8592;</a>
    <h1>Movimentação de Caixa</h1>
  </div>
</div>

<div class="container">
  <div class="form-card">
    <div class="form-group">
      <label>Tipo</label>
      <div class="radio-group">
        <label>
          <input type="radio" name="tipo" value="entrada" checked />
          Entrada
        </label>
        <label>
          <input type="radio" name="tipo" value="saida" />
          Saída
        </label>
      </div>
    </div>
    <div class="form-group">
      <label for="valor">Valor (R$)</label>
      <input type="number" id="valor" placeholder="0,00" min="0" step="0.01" />
    </div>
    <div class="form-group">
      <label for="descricao">Descrição</label>
      <input type="text" id="descricao" placeholder="ex: pagamento fornecedor" />
    </div>
    <div class="btn-row">
      <a href="index.html" class="btn" style="text-align:center; text-decoration:none; display:flex; align-items:center; justify-content:center;">Cancelar</a>
      <button class="btn primary" onclick="salvar()">Salvar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="app.js"></script>
<script>
  function salvar() {
    const tipo = document.querySelector('input[name="tipo"]:checked').value;
    const valor = document.getElementById('valor').value;
    const descricao = document.getElementById('descricao').value;

    if (!valor || !descricao) {
      showToast('Preencha todos os campos.');
      return;
    }
    if (Number(valor) <= 0) {
      showToast('Valor deve ser maior que zero.');
      return;
    }

    DB.salvarMovimento({ tipo, valor: Number(valor), descricao });
    showToast('Movimentação salva!');
    setTimeout(() => window.location.href = 'index.html', 1500);
  }
</script>
</body>
</html>
